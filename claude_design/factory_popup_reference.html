<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Factory Popup — Visual Reference</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
  body {
    margin: 0;
    background: #0a1218;
    background-image: radial-gradient(ellipse at top, #14222e 0%, #0a1218 70%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 2rem;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    color: #e5e7eb;
  }
  .popup {
    width: 440px;
    background: #1a2530;
    border: 1px solid #324658;
    border-top: 3px solid #4ade80;
    border-radius: 3px;
  }
  .header {
    padding: 11px 14px;
    border-bottom: 1px solid #2a3a48;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .factory-chip {
    background: #0e1820;
    border: 1px solid #324658;
    padding: 3px 7px;
    font-size: 11px;
    color: #94a3b8;
    letter-spacing: 0.08em;
    font-weight: 500;
  }
  .machine-name {
    flex: 1;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.06em;
    color: #e2e8f0;
  }
  .close-btn {
    background: transparent;
    border: 1px solid #324658;
    color: #94a3b8;
    width: 24px;
    height: 24px;
    cursor: pointer;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .close-btn:hover {
    border-color: #4ade80;
    color: #fff;
  }
  .description {
    padding: 8px 14px;
    font-size: 12px;
    color: #94a3b8;
    text-align: center;
    font-style: italic;
    border-bottom: 1px solid #2a3a48;
    background: #16212c;
  }
  .schematic-wrap {
    padding: 16px 14px 4px;
    display: flex;
    justify-content: center;
  }
  .blueprint {
    width: 180px;
    height: 110px;
    background-color: #0a3252;
    background-image:
      linear-gradient(rgba(56,189,248,0.18) 1px, transparent 1px),
      linear-gradient(90deg, rgba(56,189,248,0.18) 1px, transparent 1px);
    background-size: 14px 14px;
    border: 1px solid #1e4d75;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .blueprint .bomb {
    font-size: 56px;
    color: #cbe9ff;
  }
  .blueprint .question {
    position: absolute;
    font-size: 22px;
    font-weight: 500;
    color: #fef3c7;
    margin-left: 4px;
    margin-top: -4px;
  }
  .blueprint .label {
    position: absolute;
    top: 4px;
    left: 6px;
    font-size: 9px;
    color: #5ab4ed;
    letter-spacing: 0.1em;
  }
  .commission-row {
    padding: 12px 14px 14px;
    display: flex;
    gap: 10px;
    align-items: stretch;
  }
  .commission-btn {
    flex: 1;
    background: #cbd5e1;
    color: #0f172a;
    border: 1px solid #94a3b8;
    border-bottom: 3px solid #64748b;
    padding: 10px 12px;
    cursor: pointer;
    font-weight: 500;
    letter-spacing: 0.08em;
    font-size: 13px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .commission-btn:hover {
    background: #e2e8f0;
  }
  .commission-btn:active {
    transform: scale(0.97);
    border-bottom-width: 1px;
  }
  .cost-chip {
    font-size: 13px;
    display: flex;
    gap: 5px;
    align-items: center;
    background: #f1f5f9;
    padding: 2px 8px;
    border-radius: 2px;
    color: #0f172a;
    border: 1px solid #94a3b8;
  }
  .cost-chip .ti-mushroom { color: #b91c1c; }
  .cycle {
    width: 92px;
    background: #0e1820;
    border: 1px solid #324658;
    padding: 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .cycle-label { font-size: 11px; color: #94a3b8; letter-spacing: 0.08em; }
  .cycle-time { font-size: 20px; font-weight: 500; color: #4ade80; margin-top: 2px; font-family: 'SF Mono', Menlo, monospace; }
  .cycle-sub { font-size: 11px; color: #94a3b8; }
  .section { padding: 0 14px 12px; }
  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    color: #94a3b8;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }
  .section-header .label { font-weight: 500; }
  .section-header .status { color: #4ade80; font-weight: 500; }
  .queue-box {
    background: #0e1820;
    border: 1px solid #324658;
    padding: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .mini-blueprint {
    width: 36px;
    height: 36px;
    background-color: #0a3252;
    background-image:
      linear-gradient(rgba(56,189,248,0.2) 1px, transparent 1px),
      linear-gradient(90deg, rgba(56,189,248,0.2) 1px, transparent 1px);
    background-size: 8px 8px;
    border: 1px solid #1e4d75;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .mini-blueprint .ti-bomb { font-size: 22px; color: #cbe9ff; }
  .progress-wrap { flex: 1; }
  .progress-bar {
    height: 8px;
    background: #0a1218;
    border: 1px solid #1e2c38;
  }
  .progress-fill {
    width: 31%;
    height: 100%;
    background: #4ade80;
  }
  .progress-sub {
    font-size: 11px;
    color: #94a3b8;
    margin-top: 5px;
    display: flex;
    justify-content: space-between;
  }
  .progress-sub .time { color: #cbd5e1; }
  .queue-dots { display: flex; gap: 4px; }
  .queue-dot {
    width: 22px;
    height: 22px;
    border: 1px dashed rgba(74,222,128,0.33);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: #4ade80;
    font-weight: 500;
  }
  .take-all {
    background: transparent;
    color: #cbd5e1;
    border: 1px solid #64748b;
    padding: 3px 10px;
    font-size: 11px;
    cursor: pointer;
    font-weight: 500;
    letter-spacing: 0.08em;
  }
  .take-all:hover { border-color: #4ade80; color: #fff; }
  .storage-grid {
    background: #0e1820;
    border: 1px solid #324658;
    padding: 8px;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
  }
  .storage-slot {
    aspect-ratio: 1;
    background: #1a2530;
    border: 1px solid #324658;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    cursor: pointer;
  }
  .storage-slot:hover { border-color: #4ade80; transform: scale(1.05); }
  .storage-slot .ti { font-size: 22px; }
  .storage-slot .count {
    position: absolute;
    bottom: 1px;
    right: 3px;
    font-size: 11px;
    color: #4ade80;
    font-weight: 500;
  }
  .storage-slot.empty {
    background: #0a1218;
    border: 1px dashed #2a3a48;
    cursor: default;
  }
  .storage-slot.empty:hover { transform: none; border-color: #2a3a48; }
</style>
</head>
<body>
  <div class="popup">

    <div class="header">
      <div class="factory-chip">FACTORY 1</div>
      <div class="machine-name">DISCOMBOBULATOR 2000</div>
      <button class="close-btn" aria-label="Close"><i class="ti ti-x" style="font-size:14px"></i></button>
    </div>

    <div class="description">Produces a random weak bomb each cycle.</div>

    <div class="schematic-wrap">
      <div class="blueprint">
        <i class="ti ti-bomb bomb"></i>
        <span class="question">?</span>
        <span class="label">SCHEMATIC · 01</span>
      </div>
    </div>

    <div class="commission-row">
      <button class="commission-btn">
        <span>COMMISSION +1</span>
        <span class="cost-chip">
          <i class="ti ti-mushroom" style="font-size:14px"></i> 25
        </span>
      </button>
      <div class="cycle">
        <div class="cycle-label">CYCLE</div>
        <div class="cycle-time">5:00</div>
        <div class="cycle-sub">per bomb</div>
      </div>
    </div>

    <div class="section">
      <div class="section-header">
        <span class="label">▸ PRODUCTION QUEUE</span>
        <span class="status">1 / 3 done</span>
      </div>
      <div class="queue-box">
        <div class="mini-blueprint"><i class="ti ti-bomb"></i></div>
        <div class="progress-wrap">
          <div class="progress-bar"><div class="progress-fill"></div></div>
          <div class="progress-sub">
            <span class="time"><i class="ti ti-clock" style="font-size:12px;vertical-align:-2px"></i> 3m 26s</span>
            <span>bomb 2 of 3</span>
          </div>
        </div>
        <div class="queue-dots">
          <div class="queue-dot">?</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-header">
        <span class="label">▸ STORAGE <span style="color:#4ade80; margin-left:4px; letter-spacing:0">· 5 ready</span></span>
        <button class="take-all">TAKE ALL</button>
      </div>
      <div class="storage-grid">
        <div class="storage-slot">
          <i class="ti ti-bomb" style="color:#93c5fd"></i>
          <div class="count">×2</div>
        </div>
        <div class="storage-slot">
          <i class="ti ti-flame" style="color:#fbbf24"></i>
          <div class="count">×3</div>
        </div>
        <div class="storage-slot empty"></div>
        <div class="storage-slot empty"></div>
        <div class="storage-slot empty"></div>
        <div class="storage-slot empty"></div>
      </div>
    </div>

  </div>
</body>
</html>
