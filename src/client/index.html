<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roombov</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💣</text></svg>" />
  <!-- Pixel Panel UI fonts: Press Start 2P (headings/data) + Silkscreen (labels/body).
       BootScene gates first render on document.fonts.ready so Phaser caches glyphs. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Silkscreen:wght@400;700&display=swap" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; overflow: hidden; }
    /* dvh tracks the *visible* viewport (excludes the mobile URL bar) where
       supported; installMobileViewport() also sets explicit px on mobile. */
    #game { width: 100vw; height: 100vh; height: 100dvh; }
  </style>
</head>
<body>
  <div id="game"></div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
